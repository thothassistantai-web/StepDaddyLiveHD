services:
  step-daddy-live-hd:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: ${PORT:-3000}
        API_URL: ${API_URL:-http://127.0.0.1:3000}
        PROXY_CONTENT: ${PROXY_CONTENT:-TRUE}
        SOCKS5: ${SOCKS5:-}
    environment:
      - PORT=${PORT:-3000}
      - API_URL=${API_URL:-http://127.0.0.1:3000}
      - PROXY_CONTENT=${PROXY_CONTENT:-TRUE}
      - SOCKS5=${SOCKS5:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    env_file:
      - .env
